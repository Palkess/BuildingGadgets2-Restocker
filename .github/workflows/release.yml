name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        required: true
        type: choice
        options: [major, minor]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            MSGS=$(git log -1 --pretty=%B)
          else
            MSGS=$(git log --pretty=%B "$BEFORE..${{ github.sha }}")
          fi
          if echo "$MSGS" | grep -qiE '(^|[^a-z])major:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSGS" | grep -qiE '(^|[^a-z])minor:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            # First release: use the version from gradle.properties as-is.
            VERSION=$(sed -n 's/^mod_version=//p' gradle.properties)
          else
            BASE="${LATEST_TAG#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            if [ "${{ steps.bump.outputs.bump }}" = "major" ]; then
              VERSION="$((MAJOR + 1)).0.0"
            else
              VERSION="${MAJOR}.$((MINOR + 1)).0"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION (${{ steps.bump.outputs.bump }} bump from ${LATEST_TAG:-none})"

      - name: Set up JDK 21
        if: steps.bump.outputs.bump != 'none'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.bump.outputs.bump != 'none'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build
        if: steps.bump.outputs.bump != 'none'
        run: gradle build "-Pmod_version=${{ steps.version.outputs.version }}"

      - name: Create release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/libs/*.jar
